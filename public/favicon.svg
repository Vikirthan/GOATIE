  <path d="M185 185 Q165 130 190 100 Q200 140 210 170 Z" fill="white"/>
  <!-- Right horn -->
  <path d="M327 185 Q347 130 322 100 Q312 140 302 170 Z" fill="white"/>
  <!-- Left ear -->
  <ellipse cx="160" cy="230" rx="28" ry="18" fill="white" transform="rotate(-20,160,230)"/>
