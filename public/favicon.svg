<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Green background -->
  <rect width="512" height="512" rx="96" fill="#22c55e"/>
  <!-- Goat head - stylized flat design -->
  <!-- Body/Head oval -->
